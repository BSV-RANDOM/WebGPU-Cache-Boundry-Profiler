<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU Profiler (Graphics Pipeline)</title>
    <style>
        body { font-family: monospace; background-color: #121212; color: #ffaa00; padding: 15px; font-size: 13px; }
        button { padding: 15px 30px; font-size: 16px; font-weight: bold; background-color: #333; color: white; border: 2px solid #ffaa00; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        button:active { background-color: #ffaa00; color: black; }
        button:disabled { border-color: #555; color: #555; cursor: not-allowed; }
        #output { white-space: pre-wrap; line-height: 1.4; }
        .graph-bar { color: #00ff00; }
        .error-msg { color: #ff5555; }
    </style>
</head>
<body>

    <h2>WebGPU Graphics Pipeline Profiler (ROPs & DCC)</h2>
    <button id="runBtn">Start Profiling (1MB to 500MB)</button>
    <div id="output">Ready...</div>

<script>
const outputDiv = document.getElementById('output');
const runBtn = document.getElementById('runBtn');

function log(msg) { outputDiv.innerHTML += msg + "\n"; }

// Vertex shader generates a massive full-screen triangle to cover the texture
// Fragment shader reads exactly one pixel and writes it back + 0.0001
const wgslSource = `
@vertex
fn vs_main(@builtin(vertex_index) VertexIndex : u32) -> @builtin(position) vec4<f32> {
    var pos = array<vec2<f32>, 3>(
        vec2<f32>(-1.0, -1.0),
        vec2<f32>( 3.0, -1.0),
        vec2<f32>(-1.0,  3.0)
    );
    return vec4<f32>(pos[VertexIndex], 0.0, 1.0);
}

@group(0) @binding(0) var texIn: texture_2d<f32>;

@fragment
fn fs_main(@builtin(position) coord: vec4<f32>) -> @location(0) vec4<f32> {
    let val = textureLoad(texIn, vec2<i32>(coord.xy), 0);
    return val + vec4<f32>(0.0001);
}
`;

async function runProfiler() {
    if (!navigator.gpu) {
        log("<span class='error-msg'>❌ WebGPU is not supported.</span>"); 
        return;
    }

    runBtn.disabled = true;
    outputDiv.innerHTML = "Initializing WebGPU Graphics Pipeline...\n\n";

    const adapter = await navigator.gpu.requestAdapter({ powerPreference: "high-performance" });
    
    // Explicitly ask for maxBufferSize to prevent Dawn's staging buffer crash
    const requiredLimits = {
        maxTextureDimension2D: adapter.limits.maxTextureDimension2D,
        maxBufferSize: adapter.limits.maxBufferSize
    };
    
    const device = await adapter.requestDevice({ requiredLimits });

    device.addEventListener('uncapturederror', (event) => {
        log(`<span class='error-msg'>🚨 Error: ${event.error.message}</span>`);
    });

    const maxTexSize = device.limits.maxTextureDimension2D;
    const absoluteMaxMB = Math.floor((maxTexSize * maxTexSize * 16) / (1024 * 1024));

    log(`ℹ️ Adapter: ${adapter.info ? adapter.info.architecture : 'Unknown GPU'}`);
    log(`ℹ️ Max Texture Dim: ${maxTexSize}px (~${absoluteMaxMB} MB limit)`);
    log("Size (MB) | Speed (GB/s) | Graph");
    log("--------------------------------------------------");

    let currentSizeMB = 1.0;
    const targetMaxSizeMB = 500.0;
    const growthFactor = 1.15;
    const finalLimitMB = Math.min(targetMaxSizeMB, absoluteMaxMB);

    const shaderModule = device.createShaderModule({ code: wgslSource });
    
    // Create a RENDER pipeline instead of COMPUTE
    const pipeline = device.createRenderPipeline({
        layout: 'auto',
        vertex: { module: shaderModule, entryPoint: 'vs_main' },
        fragment: {
            module: shaderModule,
            entryPoint: 'fs_main',
            targets: [{ format: 'rgba32float' }] // Write target format
        },
        primitive: { topology: 'triangle-list' }
    });

    while (currentSizeMB <= finalLimitMB) {
        const targetPixels = (currentSizeMB * 1024 * 1024) / 16;
        const width = Math.floor(Math.sqrt(targetPixels));
        const height = Math.floor(targetPixels / width);
        
        const actualSizeMB = (width * height * 16) / (1024 * 1024);
        const bytesTransferredPerPass = (width * height * 16) * 2; 

        // Usage includes RENDER_ATTACHMENT so it acts like a WebGL Framebuffer
        const texA = device.createTexture({
            size: [width, height, 1],
            format: 'rgba32float',
            usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.RENDER_ATTACHMENT
        });
        const texB = device.createTexture({
            size: [width, height, 1],
            format: 'rgba32float',
            usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.RENDER_ATTACHMENT
        });

        const viewA = texA.createView();
        const viewB = texB.createView();

        const bindGroupReadA = device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: [{ binding: 0, resource: viewA }]
        });
        const bindGroupReadB = device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: [{ binding: 0, resource: viewB }]
        });

        async function executePasses(numPasses) {
            const safePasses = Math.max(2, Math.floor(numPasses / 2) * 2);
            const start = performance.now();
            const commandEncoder = device.createCommandEncoder();

            for (let i = 0; i < safePasses; i += 2) {
                // Pass 1: Read A, Write to B
                const pass1 = commandEncoder.beginRenderPass({
                    colorAttachments: [{
                        view: viewB,
                        clearValue: { r: 0, g: 0, b: 0, a: 0 },
                        loadOp: 'clear', storeOp: 'store'
                    }]
                });
                pass1.setPipeline(pipeline);
                pass1.setBindGroup(0, bindGroupReadA);
                pass1.draw(3); // Draw full screen triangle
                pass1.end();

                // Pass 2: Read B, Write to A
                const pass2 = commandEncoder.beginRenderPass({
                    colorAttachments: [{
                        view: viewA,
                        clearValue: { r: 0, g: 0, b: 0, a: 0 },
                        loadOp: 'clear', storeOp: 'store'
                    }]
                });
                pass2.setPipeline(pipeline);
                pass2.setBindGroup(0, bindGroupReadB);
                pass2.draw(3);
                pass2.end();
            }

            device.queue.submit([commandEncoder.finish()]);
            await device.queue.onSubmittedWorkDone(); 
            return performance.now() - start;
        }

        // Differential Timing
        let passesLong = Math.max(20, Math.floor(4000 / actualSizeMB)); 
        passesLong = Math.ceil(passesLong / 2) * 2; 
        let passesShort = Math.max(4, Math.floor(passesLong / 5)); 
        passesShort = Math.ceil(passesShort / 2) * 2; 

        await executePasses(6); // Wakeup
        
        const timeShort = await executePasses(passesShort); 
        await new Promise(r => setTimeout(r, 20)); 
        const timeLong = await executePasses(passesLong); 
        
        const pureGPUTimeMs = Math.max(timeLong - timeShort, 0.1);
        const purePasses = passesLong - passesShort;
        
        const timePerPassMs = pureGPUTimeMs / purePasses;
        const passesPerSecond = 1000 / timePerPassMs;
        const bandwidthGBps = (passesPerSecond * bytesTransferredPerPass) / (1024 * 1024 * 1024);

        const barBlocks = Math.max(1, Math.floor(bandwidthGBps / 10)); 
        const barString = "█".repeat(barBlocks);

        const sizeStr = actualSizeMB.toFixed(1).padStart(5, ' ');
        const bwStr = bandwidthGBps.toFixed(1).padStart(6, ' ');
        
        log(`${sizeStr} MB | ${bwStr} GB/s | <span class="graph-bar">${barString}</span>`);

        texA.destroy();
        texB.destroy();

        currentSizeMB *= growthFactor;
        await new Promise(r => setTimeout(r, 50)); 
    }

    log("--------------------------------------------------");
    log("✅ Profiling Complete!");
    runBtn.disabled = false;
}

runBtn.addEventListener('click', runProfiler);
</script>

</body>
</html>
