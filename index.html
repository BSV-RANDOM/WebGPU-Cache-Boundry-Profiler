<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU Profiler (RDNA-3 Optimized)</title>
    <style>
        body { font-family: monospace; background-color: #121212; color: #ffaa00; padding: 15px; font-size: 13px; }
        button { padding: 15px 30px; font-size: 16px; font-weight: bold; background-color: #333; color: white; border: 2px solid #ffaa00; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        button:active { background-color: #ffaa00; color: black; }
        button:disabled { border-color: #555; color: #555; cursor: not-allowed; }
        #output { white-space: pre-wrap; line-height: 1.4; }
        .graph-bar { color: #00ff00; }
        .error-msg { color: #ff5555; }
    </style>
</head>
<body>

    <h2>WebGPU Cache Boundary Profiler</h2>
    <button id="runBtn">Start Profiling (1MB to 500MB)</button>
    <div id="output">Ready...</div>

<script>
const outputDiv = document.getElementById('output');
const runBtn = document.getElementById('runBtn');

function log(msg) { outputDiv.innerHTML += msg + "\n"; }

// Aggressive 8x unrolling to saturate deep RDNA-3 memory pipelines
const getWGSLSource = (wgX) => `
@group(0) @binding(0) var<storage, read> bufferIn: array<vec4<f32>>;
@group(0) @binding(1) var<storage, read_write> bufferOut: array<vec4<f32>>;

@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) global_id: vec3<u32>) {
    // 8 elements per thread
    let base_idx = (global_id.x + global_id.y * (${wgX}u * 64u)) * 8u;
    
    if (base_idx + 7u >= arrayLength(&bufferIn)) { return; }

    let add = vec4<f32>(0.0001);
    
    // Read phase - Flood the memory controller with requests
    let v0 = bufferIn[base_idx];
    let v1 = bufferIn[base_idx + 1u];
    let v2 = bufferIn[base_idx + 2u];
    let v3 = bufferIn[base_idx + 3u];
    let v4 = bufferIn[base_idx + 4u];
    let v5 = bufferIn[base_idx + 5u];
    let v6 = bufferIn[base_idx + 6u];
    let v7 = bufferIn[base_idx + 7u];

    // Write phase
    bufferOut[base_idx] = v0 + add;
    bufferOut[base_idx + 1u] = v1 + add;
    bufferOut[base_idx + 2u] = v2 + add;
    bufferOut[base_idx + 3u] = v3 + add;
    bufferOut[base_idx + 4u] = v4 + add;
    bufferOut[base_idx + 5u] = v5 + add;
    bufferOut[base_idx + 6u] = v6 + add;
    bufferOut[base_idx + 7u] = v7 + add;
}
`;

async function runProfiler() {
    if (!navigator.gpu) {
        log("<span class='error-msg'>❌ WebGPU is not supported.</span>"); 
        return;
    }

    runBtn.disabled = true;
    outputDiv.innerHTML = "Initializing WebGPU...\n\n";

    const adapter = await navigator.gpu.requestAdapter({ powerPreference: "high-performance" });
    
    // Explicitly ask for ALL the memory the adapter allows
    const requiredLimits = {
        maxStorageBufferBindingSize: adapter.limits.maxStorageBufferBindingSize,
        maxBufferSize: adapter.limits.maxBufferSize, // <-- The missing key from the error message
        maxComputeWorkgroupsPerDimension: adapter.limits.maxComputeWorkgroupsPerDimension
    };
    
    const device = await adapter.requestDevice({ requiredLimits });

    device.addEventListener('uncapturederror', (event) => {
        log(`<span class='error-msg'>🚨 Error: ${event.error.message}</span>`);
    });

    // Our max size is bound by whichever limit is lower
    const maxAllocMB = Math.floor(device.limits.maxBufferSize / (1024 * 1024));
    const maxBindMB = Math.floor(device.limits.maxStorageBufferBindingSize / (1024 * 1024));
    const maxSafeMB = Math.min(maxAllocMB, maxBindMB);

    log(`ℹ️ Adapter: ${adapter.info ? adapter.info.architecture : 'Unknown GPU'}`);
    log(`ℹ️ Safe Allocation Limit: ${maxSafeMB} MB`);
    log("Size (MB) | Speed (GB/s) | Graph");
    log("--------------------------------------------------");

    let currentSizeMB = 1.0;
    let targetMaxSizeMB = 500.0;
    const growthFactor = 1.15;
    const absoluteMaxMB = Math.min(targetMaxSizeMB, maxSafeMB);

    while (currentSizeMB <= absoluteMaxMB) {
        const sizeBytes = Math.floor(currentSizeMB * 1024 * 1024);
        
        const alignedSizeBytes = Math.ceil(sizeBytes / 256) * 256;
        const actualSizeMB = alignedSizeBytes / (1024 * 1024);
        const bytesTransferredPerPass = alignedSizeBytes * 2; 

        const bufferA = device.createBuffer({ size: alignedSizeBytes, usage: GPUBufferUsage.STORAGE });
        const bufferB = device.createBuffer({ size: alignedSizeBytes, usage: GPUBufferUsage.STORAGE });

        // Calculate dispatch geometry based on 8 elements per thread
        const elementsCount = alignedSizeBytes / 16; 
        const threadsNeeded = Math.ceil(elementsCount / 8); 
        const totalWorkgroups = Math.ceil(threadsNeeded / 64);
        
        const limitX = 65000; 
        const wgX = Math.min(totalWorkgroups, limitX);
        const wgY = Math.ceil(totalWorkgroups / wgX);

        const shaderModule = device.createShaderModule({ code: getWGSLSource(wgX) });
        const pipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: shaderModule, entryPoint: "main" }
        });

        const bindGroupAB = device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: [{ binding: 0, resource: { buffer: bufferA } }, { binding: 1, resource: { buffer: bufferB } }]
        });
        const bindGroupBA = device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: [{ binding: 0, resource: { buffer: bufferB } }, { binding: 1, resource: { buffer: bufferA } }]
        });

        async function executePasses(numPasses) {
            const safePasses = Math.max(2, Math.floor(numPasses / 2) * 2);
            const start = performance.now();
            const commandEncoder = device.createCommandEncoder();

            for (let i = 0; i < safePasses; i += 2) {
                const pass1 = commandEncoder.beginComputePass();
                pass1.setPipeline(pipeline);
                pass1.setBindGroup(0, bindGroupAB);
                pass1.dispatchWorkgroups(wgX, wgY);
                pass1.end();

                const pass2 = commandEncoder.beginComputePass();
                pass2.setPipeline(pipeline);
                pass2.setBindGroup(0, bindGroupBA);
                pass2.dispatchWorkgroups(wgX, wgY);
                pass2.end();
            }

            device.queue.submit([commandEncoder.finish()]);
            await device.queue.onSubmittedWorkDone(); 
            return performance.now() - start;
        }

        let passesTarget = Math.max(10, Math.floor(4000 / actualSizeMB)); 
        passesTarget = Math.ceil(passesTarget / 2) * 2; 

        // Extended Warmup to force Android GPU Governor into high-power state
        await executePasses(6); 
        
        const timeMs = await executePasses(passesTarget); 
        
        const passesPerSecond = (passesTarget / timeMs) * 1000;
        const bandwidthGBps = (passesPerSecond * bytesTransferredPerPass) / (1024 * 1024 * 1024);

        const barBlocks = Math.max(1, Math.floor(bandwidthGBps / 10)); 
        const barString = "█".repeat(barBlocks);

        const sizeStr = actualSizeMB.toFixed(1).padStart(5, ' ');
        const bwStr = bandwidthGBps.toFixed(1).padStart(6, ' ');
        
        log(`${sizeStr} MB | ${bwStr} GB/s | <span class="graph-bar">${barString}</span>`);

        bufferA.destroy();
        bufferB.destroy();

        currentSizeMB *= growthFactor;
        await new Promise(r => setTimeout(r, 50)); 
    }

    log("--------------------------------------------------");
    log("✅ Profiling Complete!");
    runBtn.disabled = false;
}

runBtn.addEventListener('click', runProfiler);
</script>

</body>
</html>
